<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournament Predictor - Home</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"

    />
    <link

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#D4AF37',
              brand: {
                black: '#0A0A0A',
                gold: '#D4AF37',
                gray: '#1A1A1A',
                lightGray: '#262626',

              'background-light': '#F3F4F6',

            borderRadius: {
              DEFAULT: '12px',
              xl: '20px',
            },
            backgroundImage: {
              'carbon-pattern': "url('https://www.transparenttextures.com/patterns/carbon-fibre.png')",
